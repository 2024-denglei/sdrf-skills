name: Check SDRF Spec Freshness

on:
  pull_request:
    branches: [main]

jobs:
  check-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check if spec submodule is up to date
        run: |
          # Get current submodule commit
          CURRENT=$(git -C spec rev-parse HEAD)

          # Fetch latest from upstream
          git -C spec fetch origin

          # Get latest upstream commit on default branch
          LATEST=$(git -C spec rev-parse origin/HEAD 2>/dev/null || git -C spec rev-parse origin/master 2>/dev/null || git -C spec rev-parse origin/main 2>/dev/null)

          echo "Current spec commit: $CURRENT"
          echo "Latest upstream commit: $LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "## ✅ SDRF spec is up to date" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Submodule \`spec/\` is at the latest upstream commit (\`${CURRENT:0:12}\`)." >> "$GITHUB_STEP_SUMMARY"
          else
            BEHIND_COUNT=$(git -C spec rev-list --count "$CURRENT".."$LATEST" 2>/dev/null || echo "unknown")
            echo "## ⚠️ SDRF spec is outdated" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Submodule \`spec/\` is **${BEHIND_COUNT} commits behind** the latest upstream." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| | Commit |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Current | \`${CURRENT:0:12}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Latest | \`${LATEST:0:12}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run the [update-spec](/${{ github.repository }}/actions/workflows/update-spec.yml) workflow or update manually:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
            echo "git submodule update --remote --recursive" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

            echo "::warning::SDRF spec submodule is ${BEHIND_COUNT} commits behind upstream. Consider updating."
          fi
